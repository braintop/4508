<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרטיסי מוצרים - Flex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>המוצרים שלנו</h1>

    <div class="products">

        <div class="card">
            <h2>אוזניות אלחוטיות</h2>
            <p>אוזניות בלוטות' איכותיות עם סינון רעשים וסוללה ל-30 שעות</p>
            <button>הוסף לסל</button>
        </div>

        <div class="card">
            <h2>מקלדת מכנית</h2>
            <p>מקלדת גיימינג עם תאורת RGB ומתגים מכניים שקטים</p>
            <button>הוסף לסל</button>
        </div>

        <div class="card">
            <h2>עכבר ארגונומי</h2>
            <p>עכבר אלחוטי עם עיצוב ארגונומי למניעת עייפות כף היד</p>
            <button>הוסף לסל</button>
        </div>

        <div class="card">
            <h2>מסך 27 אינץ'</h2>
            <p>מסך 4K עם פאנל IPS, צבעים מדויקים וקצב רענון 144Hz</p>
            <button>הוסף לסל</button>
        </div>

    </div>

</body>
</html>
